<!DOCTYPE html>
<html>
<body>

<!-- Page title -->
<h2>Update Age in Customer Profile</h2>

<!--
HTML form for updating customer profile records.
method="POST" sends data to Flask route.
-->
<form method="POST">

    <!-- Customer ID input -->
    Customer ID: <input name="cust_id"><br><br>
    <!-- Age input -->
    New age: <input name="age"><br><br>
    <!-- Submit button -->
    <button type="submit">Update Age</button>
</form>

<br>

<!-- Link back to homepage -->
<a href="/">Home</a>

</body>
</html>
