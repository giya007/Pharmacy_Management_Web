<!DOCTYPE html>
<html>
<body>

<!-- Page title -->
<h2>Add Medicine</h2>

<!--
HTML form for adding medicine records.
method="POST" sends data to Flask route.
-->
<form method="POST">

    <!-- Medicine ID input -->
    Medicine ID: <input name="med_id"><br><br>

    <!-- Medicine name input -->
    Name: <input name="med_name"><br><br>
    
    Manufacturer: <input name="mfr"><br><br>

    Expiry_date: <input name="exp"><br><br>

    <!-- Stock quantity input -->
    Stock: <input name="stock"><br><br>

    <!-- Medicine price input -->
    MRP: <input name="mrp"><br><br>

    <!-- Submit button -->
    <button type="submit">Add</button>
</form>

<br>

<!-- Link back to homepage -->
<a href="/">Home</a>

</body>
</html>
